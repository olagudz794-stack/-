<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Битва полов: Крестики-нолики</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a2e;
            color: #eaeaea;
            margin-top: 30px;
            overflow: hidden;
        }

        h1 {
            color: #e94560;
            text-shadow: 0 0 10px #e94560;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .mode-switcher { margin-bottom: 20px; }
        .mode-btn {
            padding: 8px 15px; font-size: 14px; border: none; border-radius: 20px;
            cursor: pointer; margin: 0 5px; background-color: #16213e; color: #fff; transition: all 0.3s;
        }
        .mode-btn.active { background-color: #0f3460; box-shadow: 0 0 10px #0f3460; transform: scale(1.05); }

        #scoreboard {
            font-size: 20px; margin-bottom: 15px; background-color: #16213e;
            padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #scoreboard span { font-weight: bold; font-size: 22px; }
        .score-girl { color: #ff6b81; text-shadow: 0 0 5px #ff6b81; }
        .score-boy { color: #70a1ff; text-shadow: 0 0 5px #70a1ff; }
        .score-draw { color: #ffa502; }

        #status { font-size: 22px; margin-bottom: 20px; font-weight: bold; height: 30px; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        .board-container { position: relative; width: 316px; height: 316px; }
        .board {
            display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px);
            gap: 8px; position: absolute; top: 0; left: 0; z-index: 1;
        }
        .cell {
            background-color: #0f3460; display: flex; justify-content: center; align-items: center;
            font-size: 60px; font-weight: bold; cursor: pointer; border-radius: 10px; transition: background-color 0.2s, transform 0.1s;
        }
        .cell:hover { background-color: #1a4a7a; transform: scale(1.05); }
        .cell:active { transform: scale(0.95); }
        .x { color: #ff6b81; text-shadow: 0 0 15px #ff6b81; }
        .o { color: #70a1ff; text-shadow: 0 0 15px #70a1ff; }

        .win-line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .win-line {
            fill: none; stroke-width: 8; stroke-linecap: round; filter: drop-shadow(0 0 6px currentColor);
            stroke-dasharray: 450; stroke-dashoffset: 450; transition: stroke-dashoffset 0.5s ease-out;
        }
        .win-line.drawn { stroke-dashoffset: 0; }

        button {
            margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer;
            color: white; border: none; border-radius: 25px; transition: all 0.2s; font-weight: bold;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #restart-btn { background: linear-gradient(45deg, #e94560, #c23152); }
        #reset-score-btn { background-color: #57606f; margin-top: 10px; font-size: 14px; padding: 8px 15px; }

        /* --- ВСПЛЫВАЮЩЕЕ ОКНО И АНИМАЦИЯ ПЕРСОНАЖА --- */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .popup-overlay.show { opacity: 1; pointer-events: auto; }
        .popup-content {
            background-color: #16213e; padding: 40px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); transform: scale(0.8); transition: transform 0.3s;
        }
        .popup-overlay.show .popup-content { transform: scale(1); }
        
        .popup-text { font-size: 22px; font-weight: bold; margin-bottom: 25px; color: #fff; }

        /* Рисуем персонажа (лицо) средствами CSS */
        .cry-face {
            width: 120px; height: 120px; background: #ffd32a; border-radius: 50%;
            margin: 0 auto 20px; position: relative; border: 4px solid #000;
            animation: sob 0.6s infinite ease-in-out;
        }
        /* Аксессуары */
        .cry-face.boy::before { /* Кепка */
            content: ''; position: absolute; top: -15px; left: -10px; width: 140px; height: 40px;
            background: #70a1ff; border-radius: 50px 50px 0 0; border: 4px solid #000; z-index: 2;
        }
        .cry-face.girl::before { /* Бантик */
            content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-bottom: 20px solid #ff6b81; z-index: 2; filter: drop-shadow(-5px 0 0 #ff6b81) drop-shadow(5px 0 0 #ff6b81);
        }

        /* Глаза */
        .eye {
            width: 12px; height: 6px; background: #000; border-radius: 10px;
            position: absolute; top: 45px; transform: rotate(-10deg);
        }
        .eye.left { left: 30px; }
        .eye.right { right: 30px; transform: rotate(10deg); }

        /* Рот */
        .mouth {
            width: 30px; height: 15px; border-top: 4px solid #000; border-radius: 0 0 50% 50%;
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
        }

        /* Слёзы (самая крутая часть) */
        .tear {
            width: 10px; height: 16px; background: #74b9ff; border-radius: 0 0 50% 50%;
            position: absolute; top: 55px; opacity: 0;
            animation: fallingTear 0.8s infinite ease-in;
            box-shadow: inset -2px 0 2px rgba(255,255,255,0.5);
        }
        .tear.left { left: 30px; animation-delay: 0s; }
        .tear.right { right: 30px; animation-delay: 0.4s; }

        /* Анимации */
        @keyframes sob {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(8px) scale(1.02, 0.98); } /* Всхлипывание */
        }
        @keyframes fallingTear {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(60px) scale(0.5, 1.5); opacity: 0; } /* Падение и растягивание слезы */
        }
    </style>
</head>
<body>

    <h1>Битва полов</h1>
    
    <div class="mode-switcher">
        <button class="mode-btn active" onclick="setMode('bot')">Против бота</button>
        <button class="mode-btn" onclick="setMode('2player')">Вдвоём</button>
    </div>

    <div id="scoreboard">
        👧 Девочки: <span id="human-score" class="score-girl">0</span> | 
        👦 Мальчики: <span id="bot-score" class="score-boy">0</span> | 
        🤝 Ничьи: <span id="draw-score" class="score-draw">0</span>
    </div>

    <div id="status">Ход девочек (X)</div>
    
    <div class="board-container">
        <svg class="win-line-svg">
            <line id="win-line" class="win-line" x1="0" y1="0" x2="0" y2="0"/>
        </svg>
        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
    </div>

    <!-- ИСПРАВЛЕНА ОШИБКА: ДОБАВЛЕНЫ СКОБКИ () -->
    <button id="restart-btn" onclick="restartGame()">Начать заново</button>
    <button id="reset-score-btn" onclick="resetScore()">Обнулить счёт</button>

    <!-- Всплывающее окно с CSS-персонажем -->
    <div class="popup-overlay" id="loser-popup">
        <div class="popup-content">
            <!-- Вместо эмодзи рисуем лицо блоками -->
            <div class="cry-face" id="loser-face">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="mouth"></div>
                <div class="tear left"></div>
                <div class="tear right"></div>
            </div>
            <div class="popup-text" id="loser-text">Плачет и ищет утешения!</div>
            <button onclick="closePopup()" style="background: #0f3460;">Пожалеть и продолжить</button>
        </div>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const humanScoreEl = document.getElementById('human-score');
        const botScoreEl = document.getElementById('bot-score');
        const drawScoreEl = document.getElementById('draw-score');
        const winLineEl = document.getElementById('win-line');
        const popup = document.getElementById('loser-popup');
        const loserFace = document.getElementById('loser-face');
        const popupText = document.getElementById('loser-text');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        let gameMode = 'bot'; 
        let currentPlayer = 'X'; 
        
        let girlScore = 0;
        let boyScore = 0;
        let draws = 0;

        const cellCenters = [
            {x: 54, y: 54}, {x: 158, y: 54}, {x: 262, y: 54},
            {x: 54, y: 158}, {x: 158, y: 158}, {x: 262, y: 158},
            {x: 54, y: 262}, {x: 158, y: 262}, {x: 262, y: 262}
        ];

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], 
            [0, 3, 6], [1, 4, 7], [2, 5, 8], 
            [0, 4, 8], [2, 4, 6]             
        ];

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetScore();
        }

        function handleCellClick(event) {
            const clickedCell = event.target;
            const index = clickedCell.getAttribute('data-index');

            if (board[index] !== "" || !gameActive) return;
            if (gameMode === 'bot' && currentPlayer === 'O') return; 

            makeMove(clickedCell, index, currentPlayer);
            
            if (checkEnd()) return;

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatusText();

            if (gameMode === 'bot' && currentPlayer === 'O' && gameActive) {
                statusText.innerText = "Мальчик думает...";
                gameActive = false; 
                setTimeout(botTurn, 600);
            }
        }

        function botTurn() {
            if (board.includes("") && !gameActive) {
                let move = getBotMove();
                const botCell = cells[move];
                makeMove(botCell, move, 'O');
                
                if (checkEnd()) return;
                
                currentPlayer = 'X';
                updateStatusText();
                gameActive = true; 
            }
        }

        function makeMove(cell, index, player) {
            board[index] = player;
            cell.innerText = player;
            cell.classList.add(player.toLowerCase());
        }

        function checkEnd() {
            const winCombo = getWinCombo(currentPlayer);
            if (winCombo) { endGame(currentPlayer, winCombo); return true; }
            if (!board.includes("")) { endGame('draw', null); return true; }
            return false;
        }

        function getWinCombo(player) {
            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (board[a] === player && board[b] === player && board[c] === player) return winConditions[i];
            }
            return null;
        }

        function endGame(winner, combo) {
            gameActive = false;
            playVictorySound();

            if (winner === 'draw') {
                statusText.innerText = "Дружба победила! (Ничья)";
                draws++;
                drawScoreEl.innerText = draws;
            } else {
                drawWinLine(combo, winner);
                if (winner === 'X') {
                    statusText.innerText = "Девочки победили! 👧";
                    girlScore++; humanScoreEl.innerText = girlScore;
                    showLoserPopup('boy');
                } else {
                    statusText.innerText = "Мальчики победили! 👦";
                    boyScore++; botScoreEl.innerText = boyScore;
                    showLoserPopup('girl');
                }
            }
        }

        function drawWinLine(combo, winner) {
            const startIndex = combo[0]; const endIndex = combo[2];
            winLineEl.style.stroke = winner === 'X' ? '#ff6b81' : '#70a1ff';
            winLineEl.setAttribute('x1', cellCenters[startIndex].x);
            winLineEl.setAttribute('y1', cellCenters[startIndex].y);
            winLineEl.setAttribute('x2', cellCenters[endIndex].x);
            winLineEl.setAttribute('y2', cellCenters[endIndex].y);
            setTimeout(() => winLineEl.classList.add('drawn'), 50);
        }

        function updateStatusText() {
            if (currentPlayer === 'X') statusText.innerText = gameMode === 'bot' ? "Твой ход (Девочки X)" : "Ход девочек (X)";
            else statusText.innerText = gameMode === 'bot' ? "Ход бота (Мальчики O)" : "Ход мальчиков (O)";
        }

        function showLoserPopup(loserGender) {
            // Убираем старые классы мальчика/девочки
            loserFace.classList.remove('boy', 'girl');
            
            if (loserGender === 'boy') {
                loserFace.classList.add('boy'); // Добавляем кепку
                popupText.innerText = "Мальчик расплакался!";
            } else {
                loserFace.classList.add('girl'); // Добавляем бантик
                popupText.innerText = "Девочка расплакалась!";
            }
            popup.classList.add('show');
        }

        function closePopup() {
            popup.classList.remove('show');
            restartGame();
        }

        function playVictorySound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; gain.gain.value = 0.5;
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); 
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        function getBotMove() {
            let emptyIndices = [];
            board.forEach((val, idx) => { if (val === "") emptyIndices.push(idx); });
            if (Math.random() < 0.3) return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            let winMove = findWinningMove('O'); if (winMove !== -1) return winMove;
            let blockMove = findWinningMove('X'); if (blockMove !== -1) return blockMove;
            if (board[4] === "") return 4;
            return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        }

        function findWinningMove(player) {
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = player; 
                    if (getWinCombo(player)) { board[i] = ""; return i; }
                    board[i] = ""; 
                }
            }
            return -1; 
        }

        function restartGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true; currentPlayer = 'X';
            updateStatusText();
            cells.forEach(cell => { cell.innerText = ""; cell.classList.remove('x', 'o'); });
            winLineEl.classList.remove('drawn');
        }

        function resetScore() {
            girlScore = 0; boyScore = 0; draws = 0;
            humanScoreEl.innerText = girlScore; botScoreEl.innerText = boyScore; drawScoreEl.innerText = draws;
            restartGame();
        }
    </script>
</body>
</html>
